name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Unzip project
        run: unzip "SalikFlasher_ReactNative (1).zip"
      - name: Show structure
        run: find . -maxdepth 4 -type f -name "gradlew" && ls -la
      - name: Fix package.json
        run: |
          cd SalikFlasher
          sed -i 's/"react-native-usb-serialport-for-android": "\^1.0.5"/"react-native-serialport": "^2.0.0"/g' package.json
      - name: Install deps
        run: cd SalikFlasher && npm install --legacy-peer-deps
      - name: Build APK
        run: cd SalikFlasher/android && chmod +x gradlew && ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: SalikFlasher-APK
          path: SalikFlasher/android/app/build/outputs/apk/debug/app-debug.apk
