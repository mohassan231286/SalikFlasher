name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Unzip project
        run: unzip "SalikFlasher_ReactNative (1).zip"
      - name: Fix structure
        run: |
          cp -r SalikFlasher/\{android/* SalikFlasher/android/ 2>/dev/null || true
          ls SalikFlasher/android/
      - name: Fix package.json
        run: |
          cd SalikFlasher
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json'));
            delete pkg.dependencies['react-native-usb-serialport-for-android'];
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
      - name: Install deps
        run: cd SalikFlasher && npm install --legacy-peer-deps
      - name: Build APK
        run: |
          cd SalikFlasher/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: SalikFlasher-APK
          path: SalikFlasher/android/app/build/outputs/apk/debug/app-debug.apk
